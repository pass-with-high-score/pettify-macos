name: Swift CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Build
      run: |
        cd macos-menubar
        swift build -c release
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-menubar
        path: macos-menubar/.build/release/macos-menubar
